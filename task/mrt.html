<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>海中尋船任務-加密版</title>
  <style>
    body {
      margin: 0; padding: 0;
      background: url("https://img.lovepik.com/free-png/20211201/lovepik-sea-png-image_401246355_wh1200.png") no-repeat center center;
      background-size: cover; height: 100vh; overflow: hidden;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
    }
    /* 船 emoji */
    #ship {
      font-size: 60px; position: absolute; top: 250px; left: 50px;
      cursor: pointer; transition: transform 0.2s;
      animation: float 2s ease-in-out infinite;
    }
    #ship:hover { transform: scale(1.3); }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

    /* 彈窗樣式 */
    .modal {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.98);
      border: 3px solid #005eb8; padding: 25px; border-radius: 15px;
      text-align: center; z-index: 999; width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    /* 偵探筆記本按鈕 (右下角) */
    #notebook-btn {
      position: fixed; bottom: 20px; right: 20px;
      background: #005eb8; color: white; border: none;
      padding: 15px; border-radius: 50%; cursor: pointer;
      font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 1000;
    }
    
    .hint-list { text-align: left; font-size: 14px; background: #f0f7ff; padding: 10px; border-radius: 8px; margin: 10px 0; }
    button {
      padding: 10px 20px; border: none; background: #005eb8;
      color: white; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
    }
    input { padding: 12px; width: 80%; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; text-align: center; font-size: 18px; }
  </style>
</head>
<body>

<div id="ship">🚢</div>

<button id="notebook-btn" onclick="openAlert()" title="查看任務進度">📔</button>

<div id="custom-alert" class="modal" style="display: block;">
  <h3>🔍 偵探筆記本：板南線之謎</h3>
  <p>請調查並收集以下數據：</p>
  <div class="hint-list">
    1. <strong>板南線列車型號</strong> (C321 和 C341)<br>
    2. <strong>板南線車站總數</strong> (目前共幾站)<br>
    3. <strong>全線完工通車年份</strong> (最後一站通車年份)<br>
    4. <strong>公式：</strong>(型號A + 型號B) × 站數 + 年份
  </div>
  <p style="font-size: 12px; color: #ff6b6b;">※ 提示：查到後可去 Scratch 換算代碼！</p>
  <button onclick="closeAlert()">繼續調查</button>
</div>

<div id="input-modal" class="modal">
  <h3>🔒 發現加密貨船！</h3>
  <p>請輸入運算後的 5 位解密代碼：</p>
  <input type="number" id="mrtCode" placeholder="輸入數字...">
  <br>
  <button onclick="verifyCode()">解除鎖定</button>
  <button onclick="closeInput()" style="background:#666; margin-top:5px;">關閉</button>
</div>

<div id="success" class="modal">
  <h2 style="color: #2ecc71;">✅ 解碼成功！</h2>
  <p>你獲得了「板南線數據大師」徽章</p>
  <button onclick="location.href='tasks.html'">回任務列表</button>
</div>

<script>
  const alertBox = document.getElementById("custom-alert");
  const inputModal = document.getElementById("input-modal");
  const successBox = document.getElementById("success");

  function openAlert() { alertBox.style.display = "block"; }
  function closeAlert() { alertBox.style.display = "none"; }
  function closeInput() { inputModal.style.display = "none"; }

  document.getElementById("ship").addEventListener("click", () => {
    inputModal.style.display = "block";
  });

  function verifyCode() {
    const code = document.getElementById("mrtCode").value;
    if (code === "17241") {
      inputModal.style.display = "none";
      successBox.style.display = "block";
      let badges = JSON.parse(localStorage.getItem("badges") || "[]");
      if (!badges.includes("板南線數據大師")) {
        badges.push("板南線數據大師");
        localStorage.setItem("badges", JSON.stringify(badges));
      }
    } else {
      alert("❌ 密碼錯誤！請查看右下角的筆記本重新計算！");
    }
  }

  // 船漂浮運動
  let pos = 50; let direction = 1;
  setInterval(() => {
    pos += direction * 2;
    if (pos > window.innerWidth - 100 || pos < 20) direction *= -1;
    document.getElementById("ship").style.left = pos + "px";
  }, 50);
</script>

</body>
</html>
