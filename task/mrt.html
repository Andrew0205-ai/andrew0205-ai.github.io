<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>海中尋船任務 - 終極解密版</title>
  <style>
    body {
      margin: 0; padding: 0;
      background: url("https://img.lovepik.com/free-png/20211201/lovepik-sea-png-image_401246355_wh1200.png") no-repeat center center;
      background-size: cover; height: 100vh; overflow: hidden;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
    }
    /* 船 emoji */
    #ship {
      font-size: 60px; position: absolute; top: 250px; left: 50px;
      cursor: pointer; transition: transform 0.2s;
      animation: float 2s ease-in-out infinite;
    }
    #ship:hover { transform: scale(1.3); }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    /* 彈窗樣式 */
    .modal {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.98);
      border: 3px solid #005eb8; padding: 25px; border-radius: 15px;
      text-align: center; z-index: 999; width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h3 { color: #005eb8; margin-top: 0; }
    .hint-list { text-align: left; font-size: 14px; background: #f0f7ff; padding: 10px; border-radius: 8px; margin: 10px 0; }
    button {
      padding: 10px 20px; border: none; background: #005eb8;
      color: white; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
    }
    button:hover { background: #003d7a; }
    input {
      padding: 12px; width: 80%; margin: 15px 0;
      border: 2px solid #ddd; border-radius: 8px; text-align: center; font-size: 18px;
    }
    #custom-alert { display: block; } /* 初始顯示 */
  </style>
</head>
<body>

<div id="ship" title="快點擊我輸入代碼！">🚢</div>

<div id="custom-alert" class="modal">
  <h3>🔍 偵探任務：台北捷運之謎</h3>
  <p>這艘船被加密了！你需要去查出以下資料：</p>
  <div class="hint-list">
    1. <strong>台北捷運「板南線」</strong>的兩種主要列車型號數字 (C3xx)。<br>
    2. 板南線目前共有<strong>幾個車站</strong>。<br>
    3. 板南線最後一站「頂埔站」<strong>完工通車的年份</strong>。<br>
    4. 把數字帶入：<strong>(型號A+型號B) × 站數 + 年份</strong>
  </div>
  <p style="font-size: 12px; color: #ff6b6b;">※ 提示：請去小宏的<a href="https://scratch.mit.edu/projects/1267559497/" target="blank"> Scratch 專案</a>(按下Code並輸入資料，Result就是結果)換算代碼！</p>
  <button onclick="closeAlert()">我知道了，出發搜尋！</button>
</div>

<div id="input-modal" class="modal">
  <h3>🔒 發現加密貨船！</h3>
  <p>請輸入運算後的 5 位解密代碼：</p>
  <input type="number" id="mrtCode" placeholder="請輸入 5 位數字...">
  <br>
  <button onclick="verifyCode()">解除鎖定</button>
</div>

<div id="success" class="modal">
  <h2 style="color: #2ecc71;">✅ 解碼成功！</h2>
  <p>你獲得了「板南線數據大師」徽章</p>
  <button onclick="location.href='tasks.html'">回任務列表</button>
</div>

<script>
  const ship = document.getElementById("ship");
  const alertBox = document.getElementById("custom-alert");
  const inputModal = document.getElementById("input-modal");
  const successBox = document.getElementById("success");

  function closeAlert() { alertBox.style.display = "none"; }

  // 點擊船後，跳出密碼框
  ship.addEventListener("click", () => {
    inputModal.style.display = "block";
  });

  function verifyCode() {
    const code = document.getElementById("mrtCode").value;
    // (321 + 341) * 23 + 2015 = 17241
    if (code === "17241") {
      inputModal.style.display = "none";
      successBox.style.display = "block";

      // 存徽章
      let badges = JSON.parse(localStorage.getItem("badges") || "[]");
      if (!badges.includes("板南線數據大師")) {
        badges.push("板南線數據大師");
        localStorage.setItem("badges", JSON.stringify(badges));
      }
    } else {
      alert("❌ 密碼不正確！請重新檢查板南線的資料喔！");
    }
  }

  // 船漂浮運動
  let pos = 50;
  let direction = 1;
  setInterval(() => {
    pos += direction * 2;
    if (pos > window.innerWidth - 100 || pos < 20) direction *= -1;
    ship.style.left = pos + "px";
  }, 50);
</script>

</body>
</html>
