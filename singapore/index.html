<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🇸🇬 新加坡專區｜小宏的部落格</title>

  <link href="../css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3NGHCWH7TP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3NGHCWH7TP');
  </script>
  <style>
    /* ===== 全螢幕動畫容器 ===== */
    #effect-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }

    /* ===== 雪花 ===== */
    .snowflake {
      position: absolute;
      top: -20px;
      user-select: none;
      animation: snowFall linear infinite;
    }

    @keyframes snowFall {
      0%   { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(110vh) rotate(360deg); }
    }

    /* ===== 雲 ===== */
    .cloud {
      position: absolute;
      top: 10%;
      opacity: 0.8;
      animation: cloudMove linear infinite;
      font-size: 48px;
    }

    @keyframes cloudMove {
      0%   { transform: translateX(-20%); }
      100% { transform: translateX(120vw); }
    }

    /* ===== 飛機 ===== */
    .plane {
      position: absolute;
      top: 20%;
      animation: planeFly linear infinite;
      font-size: 32px;
    }

    @keyframes planeFly {
      0%   { transform: translateX(-10vw) translateY(0); }
      100% { transform: translateX(110vw) translateY(-10vh); }
    }
  </style>
</head>
<body>

<div id="effect-container"></div>

<!-- 導覽列 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="../index.html">小宏的部落格</a>
  </div>
</nav>

<!-- 主要內容 -->
<div class="container my-5" style="max-width: 900px;">

  <h1 class="fw-bold mb-3">🇸🇬 新加坡專區</h1>

  <p class="text-muted fs-5 mb-4">
    從台中出發，第一次踏上獅城。  
    這個專區將記錄我出發前的準備、旅途中的點滴，以及回來後的整理與回顧。
  </p>

  <!-- 旅程狀態 -->
  <div id="trip-status" class="alert rounded-4"></div>

  <!-- 每日專屬頁面 -->
  <div id="daily-pages" class="mt-4"></div>

  
</div>
<footer class="bg-success text-white text-center py-3">
  © 2026 小宏工作室
</footer>

<script>
  // ===============================
  // 自動判斷是否在新加坡
  // ===============================
  const today = new Date();
  const startDate = new Date(2026, 0, 29); // 1/29
  const endDate   = new Date(2026, 1, 1);  // 2/1
  const IN_SINGAPORE = today >= startDate && today <= endDate;

  // ===============================
  // 雪花與熱帶動畫
  // ===============================
  const effectContainer = document.getElementById("effect-container");
  const month = today.getMonth() + 1;
  const isWinter = [12, 1, 2].includes(month);

  function startSnow(count) {
    for (let i = 0; i < count; i++) {
      const snow = document.createElement("div");
      snow.className = "snowflake";
      snow.textContent = "❄️";
      snow.style.left = Math.random() * 100 + "vw";
      snow.style.fontSize = Math.random() * 12 + 12 + "px";
      snow.style.animationDuration = Math.random() * 5 + 5 + "s";
      effectContainer.appendChild(snow);
    }
  }

  function startTropical() {
    for (let i = 0; i < 3; i++) {
      const cloud = document.createElement("div");
      cloud.className = "cloud";
      cloud.textContent = "☁️";
      cloud.style.top = 10 + i * 15 + "%";
      cloud.style.animationDuration = 30 + i * 10 + "s";
      effectContainer.appendChild(cloud);
    }

    const plane = document.createElement("div");
    plane.className = "plane";
    plane.textContent = "✈️";
    plane.style.animationDuration = "25s";
    effectContainer.appendChild(plane);
  }

  if (isWinter && !IN_SINGAPORE) {
    startSnow(30);
  } else {
    startTropical();
  }

  // ===============================
  // 旅程狀態文字切換
  // ===============================
  const statusBox = document.getElementById("trip-status");

    statusBox.classList.add("alert-success");
    statusBox.textContent = "😀已平安返回台灣，將發布日記及照片。";
 
  

  // ===============================
  // 每日專屬頁面
  // ===============================
  const dailyPages = [
    { date: "2026-01-29", page: "day-1/" },
    { date: "2026-01-30", page: "day-2/" },
    { date: "2026-01-31", page: "day-3/" },
    { date: "2026-02-01", page: "day-4/" }
  ];

  const pagesContainer = document.getElementById("daily-pages");

  dailyPages.forEach(page => {
    const pageDate = new Date(page.date + "T00:00:00");
    if (today >= pageDate) {
      const pageDiv = document.createElement("div");
      pageDiv.className = "alert alert-info rounded-4 mb-3";
      pageDiv.innerHTML = `📅 ${page.date} 頁面：<a href="${page.page}">點此查看</a>`;
      pagesContainer.appendChild(pageDiv);
    }
  });
</script>

<script src="../js/bootstrap.bundle.min.js"></script>
</body>
</html>
